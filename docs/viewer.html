<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告查看</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #333; }
  .toolbar { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .toolbar a { color: #e94560; text-decoration: none; font-size: 0.9em; }
  .toolbar a:hover { text-decoration: underline; }
  .toolbar .title { font-weight: 600; flex: 1; }
  .content { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .error { text-align: center; padding: 60px 20px; color: #999; }
  .error h2 { color: #e94560; margin-bottom: 12px; }

  /* Markdown rendered styles */
  .content h1 { font-size: 1.8em; margin: 0 0 16px; color: #1a1a2e; border-bottom: 2px solid #e94560; padding-bottom: 8px; }
  .content h2 { font-size: 1.3em; margin: 28px 0 12px; color: #1a1a2e; }
  .content h3 { font-size: 1.1em; margin: 20px 0 8px; color: #333; }
  .content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9em; }
  .content th { background: #f0f2f5; text-align: left; padding: 10px 12px; font-weight: 600; border-bottom: 2px solid #ddd; }
  .content td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
  .content tr:hover { background: #fafbfc; }
  .content p { margin: 8px 0; line-height: 1.7; }
  .content strong { color: #1a1a2e; }
  .content ul, .content ol { margin: 8px 0 8px 24px; }
  .content li { margin: 4px 0; }
  .content code { background: #f0f2f5; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
  .content pre { background: #1a1a2e; color: #e0e0e0; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
  .content pre code { background: none; padding: 0; color: inherit; }
  .content .table-wrap { overflow-x: auto; }
  .content hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }

  @media (max-width: 768px) {
    .content { padding: 12px; }
    .content h1 { font-size: 1.4em; }
    .content table { font-size: 0.8em; }
    .content th, .content td { padding: 6px 8px; }
  }
</style>
</head>
<body>
<div class="toolbar">
  <span class="title" id="reportTitle">报告查看</span>
  <a href="index.html">回总览页</a>
</div>
<div class="content" id="content">
  <div class="error"><h2>加载中...</h2></div>
</div>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const contentEl = document.getElementById('content');

  if (!file) {
    contentEl.innerHTML = '<div class="error"><h2>未指定报告文件</h2><p>请从总览页选择报告查看</p></div>';
    return;
  }

  document.getElementById('reportTitle').textContent = file;

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const md = await resp.text();
    contentEl.innerHTML = marked.parse(md);

    // Wrap tables for horizontal scroll
    contentEl.querySelectorAll('table').forEach(t => {
      if (!t.parentElement.classList.contains('table-wrap')) {
        const wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        t.parentNode.insertBefore(wrap, t);
        wrap.appendChild(t);
      }
    });
  } catch (e) {
    contentEl.innerHTML = `<div class="error"><h2>加载失败</h2><p>${file}: ${e.message}</p></div>`;
  }
})();
</script>
</body>
</html>
